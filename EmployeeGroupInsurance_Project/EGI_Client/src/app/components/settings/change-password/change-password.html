<div class="max-w-2xl mx-auto space-y-6 animate-in fade-in zoom-in duration-300">

    <!-- HEADER -->
    <div>
        <h2 class="text-2xl font-bold tracking-tight text-gray-900 dark:text-white">Change Password</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
            Update your account password. It is recommended to use a strong password.
        </p>
    </div>

    <div
        class="bg-white dark:bg-gray-800 rounded-xl border border-gray-100 dark:border-gray-700 shadow-sm overflow-hidden mix-blend-normal relative">
        <div class="p-6 md:p-8">
            <form [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()" class="space-y-6">

                <div class="space-y-1">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">New Password</label>
                    <input type="password" formControlName="newPassword" (paste)="onPasswordPaste($event)"
                        class="block w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all sm:text-sm"
                        placeholder="••••••••">
                    @if (changePasswordForm.controls.newPassword.errors?.['minlength']) {
                    <p class="text-xs text-red-500 mt-1">Password must be at least 6 characters</p>
                    }
                </div>

                <div class="space-y-1">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Confirm New
                        Password</label>
                    <input type="password" formControlName="confirmPassword" (paste)="onPasswordPaste($event)"
                        class="block w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all sm:text-sm"
                        placeholder="••••••••">
                    @if (changePasswordForm.errors?.['mismatch']) {
                    <p class="text-xs text-red-500 mt-1">Passwords do not match</p>
                    }
                </div>

                <div class="pt-4 flex justify-end">
                    <button type="submit" [disabled]="changePasswordForm.invalid || isLoading()"
                        class="px-6 py-2.5 bg-primary-600 hover:bg-primary-700 text-white rounded-lg text-sm font-medium shadow-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed">

                        @if (isLoading()) {
                        <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white inline-block"
                            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        Updating...
                        } @else {
                        Update Password
                        }
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
