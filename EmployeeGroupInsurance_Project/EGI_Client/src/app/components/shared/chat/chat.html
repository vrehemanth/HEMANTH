<div class="fixed bottom-6 right-6 z-[2000] flex flex-col items-end pointer-events-none">
  <!-- Chat Window -->
  @if (isOpen()) {
    <div 
      class="pointer-events-auto bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl shadow-2xl w-[350px] sm:w-[400px] h-[550px] flex flex-col overflow-hidden mb-4 animate-in slide-in-from-bottom-5 fade-in duration-300">
      
      <!-- Header -->
      <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-4 text-white flex justify-between items-center rounded-t-2xl shadow-md">
        <div class="flex items-center gap-3">
          <div class="bg-white/20 p-2 rounded-full shadow-inner">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" class="animate-pulse" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a10 10 0 1 0 10 10H12V2z"></path>
              <path d="M12 12 2.1 7.1"></path>
              <path d="m12 12 6.9-8.1"></path>
            </svg>
          </div>
          <div>
            <h3 class="font-bold text-lg leading-tight">EGI AI Assistant</h3>
            <span class="text-xs text-blue-100 flex items-center gap-1">
              <span class="w-1.5 h-1.5 bg-green-400 rounded-full animate-bounce"></span> Online
            </span>
          </div>
        </div>
        <button (click)="toggleChat()" class="text-white hover:text-blue-100 bg-black/10 hover:bg-black/20 p-1.5 rounded-full transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>

      <!-- Messages Area -->
      <div #scrollMe class="p-4 flex-1 overflow-y-auto w-full flex flex-col gap-4 bg-gray-50/50 dark:bg-gray-900/50">
        @for (msg of messages(); track msg) {
          <div class="flex w-full" [ngClass]="msg.role === 'user' ? 'justify-end' : 'justify-start'">
            <div 
              class="max-w-[85%] rounded-2xl p-3 shadow-sm"
              [ngClass]="msg.role === 'user' 
                ? 'bg-blue-600 text-white rounded-br-none ml-4' 
                : 'bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 text-gray-800 dark:text-gray-200 rounded-bl-none mr-4'">
              <p class="text-[15px] leading-relaxed whitespace-pre-wrap font-medium font-sans">{{ msg.content }}</p>
            </div>
          </div>
        }
        
        <!-- Typing Indicator -->
        @if (isTyping()) {
          <div class="flex w-full justify-start">
            <div class="bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 text-gray-800 dark:text-gray-200 rounded-2xl rounded-bl-none p-4 shadow-sm">
              <div class="flex items-center gap-1.5">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0ms"></span>
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 150ms"></span>
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 300ms"></span>
              </div>
            </div>
          </div>
        }
      </div>

      <!-- Input Area -->
      <div class="p-4 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 shadow-[0_-4px_10px_-4px_rgba(0,0,0,0.05)]">
        <div class="flex items-end gap-2 bg-gray-50 dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-1.5 focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-500/20 transition-all">
          <textarea 
            [(ngModel)]="inputMessage" 
            (keydown)="handleKeyDown($event)"
            placeholder="Ask me about plans, claims, or policies..." 
            class="flex-1 max-h-32 min-h-11 bg-transparent border-none focus:ring-0 resize-none p-2.5 text-[15px] font-sans text-gray-800 dark:text-white placeholder-gray-400 outline-none"
            rows="1"></textarea>
          <button 
            (click)="sendMessage()" 
            [disabled]="isTyping() || !inputMessage().trim()"
            class="mb-1 p-2.5 shrink-0 bg-blue-600 text-white rounded-xl hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed shadow-md transition-all active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <p class="text-center text-[10px] text-gray-400 mt-2 font-medium tracking-wide">AI Assistant may generate inaccurate info.</p>
      </div>

    </div>
  }

  <!-- Toggle Button -->
  <button 
    (click)="toggleChat()" 
    class="pointer-events-auto bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-4 rounded-full shadow-xl hover:shadow-blue-500/30 hover:scale-105 active:scale-95 transition-all w-16 h-16 flex items-center justify-center border-2 border-white/20 relative group">
    
    <!-- Pulse effect behind button -->
    <span class="absolute inset-0 rounded-full bg-blue-500 opacity-0 group-hover:animate-ping -z-10"></span>
    
    @if (!isOpen()) {
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      <!-- Unread indicator bubble -->
      <span class="absolute top-0 right-0 w-3.5 h-3.5 bg-red-500 border-2 border-white rounded-full"></span>
    } @else {
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    }
  </button>
</div>
