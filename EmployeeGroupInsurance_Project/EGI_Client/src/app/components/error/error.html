<div class="min-h-screen bg-slate-900 flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Abstract Background Shapes -->
    <div
        class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-red-600/20 blur-[120px] pointer-events-none">
    </div>
    <div
        class="absolute -bottom-[20%] -right-[10%] w-[50%] h-[50%] rounded-full bg-orange-600/20 blur-[100px] pointer-events-none">
    </div>

    <div
        class="max-w-3xl w-full bg-slate-800/60 backdrop-blur-2xl border border-slate-700/50 rounded-3xl shadow-2xl p-8 md:p-12 relative z-10">
        <!-- Header Section -->
        <div class="flex items-center gap-6 mb-8 border-b border-slate-700/50 pb-8">
            <div
                class="w-20 h-20 rounded-2xl bg-red-500/10 flex items-center justify-center border border-red-500/20 shrink-0">
                <svg xmlns="http://www.w3.org/polygons/2000/svg" class="w-10 h-10 text-red-500" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
                    <path d="M12 9v4" />
                    <path d="M12 17h.01" />
                </svg>
            </div>
            <div>
                <h1 class="text-3xl md:text-4xl font-black text-white tracking-tight mb-2">{{ errorData.title }}</h1>
                <p class="text-slate-400 text-lg font-medium">We intercepted an unexpected error in the application
                    sequence.</p>
            </div>
        </div>

        <!-- Error Details -->
        <div class="space-y-6">
            <div class="bg-red-500/10 border border-red-500/20 rounded-xl p-5">
                <h3 class="text-red-400 font-bold mb-1 uppercase tracking-wider text-xs flex items-center gap-2">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 16v-4" />
                        <path d="M12 8h.01" />
                    </svg>
                    Error Message
                </h3>
                <p class="text-red-100/90 font-mono text-sm leading-relaxed">{{ errorData.message }}</p>
            </div>

            <!-- Technical Details (Stack Trace or URL) -->
            <div *ngIf="errorData.stack" class="bg-slate-900/60 border border-slate-800 rounded-xl p-5 overflow-x-auto">
                <h3 class="text-slate-500 font-bold mb-2 uppercase tracking-wider text-xs flex items-center gap-2">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                        <polyline points="14 2 14 8 20 8" />
                        <path d="M9 15v-6" />
                        <path d="M15 15v-6" />
                        <path d="M12 15v-6" />
                    </svg>
                    Technical Stack / Source
                </h3>
                <pre class="text-slate-400 font-mono text-xs whitespace-pre-wrap">{{ errorData.stack }}</pre>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="mt-10 flex flex-wrap gap-4 pt-8 border-t border-slate-700/50">
            <button (click)="goBack()"
                class="px-6 py-3 rounded-xl bg-slate-700 hover:bg-slate-600 text-white font-bold transition-all flex items-center gap-2 group">
                <svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
                Go Back
            </button>
            <button (click)="goHome()"
                class="px-6 py-3 rounded-xl bg-primary-600 hover:bg-primary-500 text-white font-bold transition-all shadow-[0_0_20px_rgba(20,184,166,0.3)] hover:shadow-[0_0_30px_rgba(20,184,166,0.5)] flex items-center gap-2">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                Return Home
            </button>
        </div>
    </div>
</div>
