<router-outlet></router-outlet>

<!-- Global Toast Notifications -->
<div class="fixed bottom-6 right-6 z-[1000] flex flex-col gap-3 pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
  <div
    class="pointer-events-auto flex items-center gap-3 w-80 p-4 rounded-xl shadow-lg border border-gray-100 dark:border-gray-800 transform transition-all duration-300 animate-in slide-in-from-right-8 fade-in"
    [ngClass]="{
           'bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100': toast.type === 'info',
           'bg-emerald-50 dark:bg-emerald-950/80 text-emerald-800 dark:text-emerald-100 border-emerald-100 dark:border-emerald-800': toast.type === 'success',
           'bg-red-50 dark:bg-red-950/80 text-red-800 dark:text-red-100 border-red-100 dark:border-red-800': toast.type === 'error',
           'bg-amber-50 dark:bg-amber-950/80 text-amber-800 dark:text-amber-100 border-amber-100 dark:border-amber-800': toast.type === 'warning'
         }">
    <div class="shrink-0 flex items-center justify-center w-8 h-8 rounded-full" [ngClass]="{
             'bg-gray-100 dark:bg-gray-700': toast.type === 'info',
             'bg-emerald-100 dark:bg-emerald-800/60 text-emerald-600 dark:text-emerald-400': toast.type === 'success',
             'bg-red-100 dark:bg-red-800/60 text-red-600 dark:text-red-400': toast.type === 'error',
             'bg-amber-100 dark:bg-amber-800/60 text-amber-600 dark:text-amber-400': toast.type === 'warning'
           }">
      @if (toast.type === 'success') {
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </svg>
      } @else if (toast.type === 'error') {
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
      } @else if (toast.type === 'info') {
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="16" x2="12" y2="12" />
        <line x1="12" y1="8" x2="12.01" y2="8" />
      </svg>
      } @else {
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
        <line x1="12" y1="9" x2="12" y2="13" />
        <line x1="12" y1="17" x2="12.01" y2="17" />
      </svg>
      }
    </div>
    <p class="flex-1 text-sm font-medium">{{ toast.message }}</p>
    <button (click)="toastService.remove(toast.id)"
      class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6 6 18" />
        <path d="m6 6 12 12" />
      </svg>
    </button>
  </div>
  }
</div>
